services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ./models:/root/.cache/huggingface
    command: >
      --model ${MODEL_NAME} --gpu-memory-utilization 0.90 --max-model-len 8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: embedding
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    ports:
      - "8080:80"
    volumes:
      - ./models:/data
    command: >
      --model-id ${EMBEDDING_MODEL_NAME}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - OPENAI_API_KEY=sk-local-vllm
      - WEBUI_AUTH=False
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - ./open-webui:/app/backend/data
    depends_on:
      - vllm
    restart: unless-stopped
