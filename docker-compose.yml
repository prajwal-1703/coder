services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    network_mode: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HUB_OFFLINE=1
      - VLLM_USE_V1=0
    volumes:
      - ./models:/models
    command:
      - --model
      - /models/${VLLM_MODEL_DIR}
      - --served-model-name
      - ${VLLM_MODEL_DIR}
      - --quantization
      - ${VLLM_QUANTIZATION}
      - --load-format
      - ${VLLM_LOAD_FORMAT}
      - --gpu-memory-utilization
      - "0.70"
      - --max-model-len
      - "16384"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    shm_size: "16gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  vllm-coder:
    image: vllm/vllm-openai:latest
    container_name: vllm-coder
    network_mode: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HUB_OFFLINE=1
      - VLLM_USE_V1=0
    volumes:
      - ./models:/models
    command:
      - --model
      - /models/${VLLM_CODER_MODEL_DIR}
      - --served-model-name
      - ${VLLM_CODER_MODEL_DIR}
      - --gpu-memory-utilization
      - "0.20"
      - --max-model-len
      - "8192"
      - --host
      - 0.0.0.0
      - --port
      - "${VLLM_CODER_PORT:-8001}"
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    shm_size: "16gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:$${VLLM_CODER_PORT:-8001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: embedding
    network_mode: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HUB_OFFLINE=1
    volumes:
      - ./models:/models
    command: >
      --model-id /models/bge-large-en-v1.5
      --port 8080
    shm_size: "2gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    network_mode: host
    environment:
      - PORT=${WEBUI_PORT:-3000}
      - OPENAI_API_BASE_URLS=http://127.0.0.1:8000/v1;http://127.0.0.1:8001/v1
      - OPENAI_API_KEYS=sk-local-vllm;sk-local-vllm
      - WEBUI_AUTH=False
      - OPENAI_API_BASE_URL_EMBEDDING=http://127.0.0.1:8080/v1
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=${EMBEDDING_MODEL_NAME}
      - HF_HUB_OFFLINE=1
    volumes:
      - ./open-webui:/app/backend/data
    depends_on:
      vllm:
        condition: service_healthy
      vllm-coder:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped
